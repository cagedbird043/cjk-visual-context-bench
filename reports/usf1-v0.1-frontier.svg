<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Unicode Snapcompact F1 v0.1 preset frontier</title>
  <desc id="desc">Benchmark chart comparing zpix18 and zpix24 visual context presets by total frames and eligible F1 on the LongBench subset with Gemini 3.5 Flash.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7fbff"/><stop offset="0.58" stop-color="#ffffff"/><stop offset="1" stop-color="#f5f0ff"/></linearGradient>
    <linearGradient id="frontier" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#0f4bd8"/></linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#163568" flood-opacity="0.14"/></filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .kicker { font-size: 21px; font-weight: 800; letter-spacing: .01em; fill: #0b163f; }
      .title { font-size: 54px; font-weight: 900; letter-spacing: -0.045em; fill: #08132f; }
      .subtitle { font-size: 23px; fill: #566176; font-weight: 560; }
      .axis { stroke: #17213a; stroke-width: 2.4; }
      .grid { stroke: #dbe2ef; stroke-width: 1.2; }
      .tick { fill: #5c667a; font-size: 20px; }
      .axis-label { fill: #17213a; font-size: 25px; font-weight: 800; }
      .point-label { font-size: 33px; font-weight: 900; letter-spacing: -0.025em; }
      .point-sub { font-size: 20px; fill: #566176; font-weight: 700; }
      .ceiling { stroke: #f59e0b; stroke-width: 3.5; stroke-dasharray: 12 9; }
      .ceiling-text { fill: #b45309; font-size: 21px; font-weight: 850; }
      .card-title { fill: #fff; font-size: 27px; font-weight: 900; }
      .card-line { fill: #c7d2fe; font-size: 20px; font-weight: 760; }
      .small { font-size: 17px; fill: #6b7280; }
    </style>
  </defs>
  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <rect x="34" y="34" width="1532" height="832" rx="34" fill="#ffffff" opacity="0.76" filter="url(#softShadow)"/>

  <text x="90" y="82" class="kicker">USF1 v0.1 · LongBench subset · Gemini 3.5 Flash</text>
  <text x="90" y="150" class="title">Unicode Snapcompact F1 preset frontier</text>
  <text x="90" y="205" class="subtitle">Higher is better. Left is denser. zpix24 trades 52% more frames for 91.0% text-baseline eligible F1.</text>

  <line x1="140.0" y1="235" x2="140.0" y2="710" class="grid"/>
  <line x1="360.0" y1="235" x2="360.0" y2="710" class="grid"/>
  <line x1="580.0" y1="235" x2="580.0" y2="710" class="grid"/>
  <line x1="800.0" y1="235" x2="800.0" y2="710" class="grid"/>
  <line x1="1020.0" y1="235" x2="1020.0" y2="710" class="grid"/>
  <line x1="1240.0" y1="235" x2="1240.0" y2="710" class="grid"/>
  <line x1="1460.0" y1="235" x2="1460.0" y2="710" class="grid"/>
  <line x1="140" y1="662.5" x2="1460" y2="662.5" class="grid"/>
  <line x1="140" y1="567.5" x2="1460" y2="567.5" class="grid"/>
  <line x1="140" y1="472.5" x2="1460" y2="472.5" class="grid"/>
  <line x1="140" y1="377.5" x2="1460" y2="377.5" class="grid"/>
  <line x1="140" y1="282.5" x2="1460" y2="282.5" class="grid"/>
  <line x1="140" y1="710" x2="1460" y2="710" class="axis"/>
  <line x1="140" y1="235" x2="140" y2="710" class="axis"/>
  <text x="140.0" y="752" text-anchor="middle" class="tick">60</text>
  <text x="360.0" y="752" text-anchor="middle" class="tick">70</text>
  <text x="580.0" y="752" text-anchor="middle" class="tick">80</text>
  <text x="800.0" y="752" text-anchor="middle" class="tick">90</text>
  <text x="1020.0" y="752" text-anchor="middle" class="tick">100</text>
  <text x="1240.0" y="752" text-anchor="middle" class="tick">110</text>
  <text x="1460.0" y="752" text-anchor="middle" class="tick">120</text>
  <text x="116" y="669.5" text-anchor="end" class="tick">0.80</text>
  <text x="116" y="574.5" text-anchor="end" class="tick">0.84</text>
  <text x="116" y="479.5" text-anchor="end" class="tick">0.88</text>
  <text x="116" y="384.5" text-anchor="end" class="tick">0.92</text>
  <text x="116" y="289.5" text-anchor="end" class="tick">0.96</text>

  <text x="800" y="812" text-anchor="middle" class="axis-label">Total rendered frames for 35 cases  ↓ denser</text>
  <text x="38" y="492" transform="rotate(-90 38 492)" text-anchor="middle" class="axis-label">Eligible F1  ↑ utility retained</text>

  <line x1="140" y1="276.8" x2="1460" y2="276.8" class="ceiling"/>
  <text x="1450" y="260.8" text-anchor="end" class="ceiling-text">text ceiling 0.9624</text>

  <path d="M 426.0 631.2 L 1262.0 483.6" fill="none" stroke="url(#frontier)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 426.0 631.2 L 1262.0 483.6" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round"/>
  
      <circle cx="426.0" cy="631.2" r="11" fill="#7c3aed" stroke="#fff" stroke-width="4"/>
      <circle cx="426.0" cy="631.2" r="22" fill="none" stroke="#7c3aed" stroke-opacity="0.18" stroke-width="10"/>
      <text x="454.0" y="519.2" class="point-label" fill="#7c3aed">zpix18 · 18px · t0.49</text>
      <text x="454.0" y="559.2" class="point-sub">84.5% text F1 · 73 frames</text>
      <text x="454.0" y="591.2" class="point-sub">11319 chars/frame</text>
    
  
      <circle cx="1262.0" cy="483.6" r="11" fill="#0f4bd8" stroke="#fff" stroke-width="4"/>
      <circle cx="1262.0" cy="483.6" r="22" fill="none" stroke="#0f4bd8" stroke-opacity="0.18" stroke-width="10"/>
      <text x="912.0" y="365.6" class="point-label" fill="#0f4bd8">zpix24 · 24px · binary</text>
      <text x="912.0" y="405.6" class="point-sub">91.0% text F1 · 111 frames</text>
      <text x="912.0" y="437.6" class="point-sub">7668 chars/frame</text>
    

  <g transform="translate(1015 574)">
    <rect width="392" height="124" rx="22" fill="#0b163f" opacity="0.96"/>
    <text x="26" y="42" class="card-title">Best visual: zpix24</text>
    <text x="26" y="78" class="card-line">0.8753 F1 · 111 frames</text>
    <text x="26" y="112" class="card-line">7.7k chars/frame</text>
  </g>
  <text x="90" y="858" class="small">Eligible cases: 18/35 where text baseline F1 ≥ 0.7. Results: reports/usf1-v0.1-longbench.md.</text>
</svg>
