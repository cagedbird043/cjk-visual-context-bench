<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CJK Visual Context Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0c0f;
      --panel: #15171d;
      --ink: #f3f0e8;
      --muted: #9aa0aa;
      --accent: #e7ff6f;
      --line: #2a2e39;
      --bad: #ff806f;
      --warn: #ffce6f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 14px 18px;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    h1 { margin: 0; font-size: 16px; letter-spacing: .02em; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    main { display: grid; grid-template-columns: 360px 1fr; min-height: calc(100vh - 62px); }
    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      overflow: auto;
    }
    .grid { display: grid; gap: 14px; }
    label { display: grid; gap: 6px; color: var(--muted); }
    .row { display: grid; grid-template-columns: 1fr 72px; gap: 10px; align-items: center; }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    input[type="number"], input[type="text"] {
      width: 100%;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0e1015;
      color: var(--ink);
      font: inherit;
    }
    button {
      padding: 10px 12px;
      border: 1px solid #556000;
      border-radius: 8px;
      background: var(--accent);
      color: #151700;
      font: 700 13px/1 ui-monospace, monospace;
      cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: progress; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding-top: 8px;
    }
    .stat { padding: 9px; border: 1px solid var(--line); border-radius: 8px; background: #101218; }
    .stat b { display: block; font-size: 18px; color: var(--accent); }
    .stat span { color: var(--muted); font-size: 11px; }
    .error { color: var(--bad); white-space: pre-wrap; }
    .cliff-panel {
      display: grid;
      gap: 10px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f1218;
    }
    .cliff-title { display: flex; justify-content: space-between; gap: 10px; color: var(--ink); }
    .cliff-title b { color: var(--accent); }
    .cliff-note { color: var(--muted); font-size: 11px; }
    .cliff-bars { display: grid; gap: 6px; }
    .cliff-row {
      display: grid;
      grid-template-columns: 52px 1fr 58px;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }
    .cliff-track {
      height: 9px;
      overflow: hidden;
      border: 1px solid #202633;
      border-radius: 999px;
      background: #080a0f;
    }
    .cliff-fill { height: 100%; background: var(--accent); }
    .cliff-row.dead .cliff-fill { background: var(--bad); }
    .cliff-row.near { color: var(--warn); }
    .cliff-row.near .cliff-fill { background: var(--warn); }
    .mono { font-variant-numeric: tabular-nums; }
    section { min-width: 0; padding: 16px; overflow: auto; }
    .frames { display: grid; gap: 18px; max-width: 100%; }
    figure { margin: 0; border: 1px solid var(--line); background: white; overflow: hidden; }
    figcaption { padding: 7px 9px; background: #11151c; color: var(--accent); border-bottom: 1px solid var(--line); }
    img { display: block; width: 100%; height: auto; image-rendering: pixelated; background: white; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CJK bitmap sharpness bench</h1>
      <div class="sub">Tune zpix raster params. Backend renders real eventized OMP archive.</div>
    </div>
    <div id="status" class="sub">idle</div>
  </header>
  <main>
    <aside>
      <div class="grid">
        <label>font size
          <div class="row"><input id="fontSize" type="range" min="10" max="24" step="1" value="18"><input id="fontSizeN" type="number" value="18"></div>
        </label>
        <label>threshold
          <div class="row"><input id="threshold" type="range" min="0" max="1" step="0.01" value="0.49"><input id="thresholdN" type="number" value="0.49" step="0.01"></div>
        </label>
        <label>line spacing
          <div class="row"><input id="lineSpacing" type="range" min="0" max="8" step="1" value="2"><input id="lineSpacingN" type="number" value="2"></div>
        </label>
        <label>frame size
          <div class="row"><input id="frameSize" type="range" min="1200" max="2200" step="50" value="2000"><input id="frameSizeN" type="number" value="2000"></div>
        </label>
        <label>content width
          <div class="row"><input id="contentWidth" type="range" min="1000" max="2200" step="50" value="2000"><input id="contentWidthN" type="number" value="2000"></div>
        </label>
        <label>content height
          <div class="row"><input id="contentHeight" type="range" min="1000" max="2200" step="50" value="2000"><input id="contentHeightN" type="number" value="2000"></div>
        </label>
        <label>margin
          <div class="row"><input id="margin" type="range" min="0" max="80" step="1" value="8"><input id="marginN" type="number" value="8"></div>
        </label>
        <label>source text
          <input id="text" type="text" value="fixtures/archives/omp-snapcompact-cjk-window-029/eventized.txt">
        </label>
        <button id="render">Render now</button>
        <div class="stats">
          <div class="stat"><b id="frames">—</b><span>frames</span></div>
          <div class="stat"><b id="chars">—</b><span>chars</span></div>
          <div class="stat"><b id="cpf">—</b><span>chars/frame</span></div>
          <div class="stat"><b id="variant">—</b><span>variant</span></div>
        </div>
        <div class="cliff-panel" id="cliffPanel">
          <div class="cliff-title"><span>coverage cliffs</span><b id="scale">—</b></div>
          <div class="cliff-note" id="cliffSummary">Render once to measure actual glyph coverage buckets.</div>
          <div class="cliff-bars" id="cliffBars"></div>
        </div>
        <div class="hint">Auto-renders after slider stop. Formal benchmark still uses QA runner.</div>
        <div id="error" class="error"></div>
      </div>
    </aside>
    <section>
      <div id="framesWrap" class="frames"></div>
    </section>
  </main>
  <script>
    const ids = ['fontSize', 'threshold', 'lineSpacing', 'frameSize', 'contentWidth', 'contentHeight', 'margin'];
    const status = document.getElementById('status');
    const error = document.getElementById('error');
    const framesWrap = document.getElementById('framesWrap');
    const cliffSummary = document.getElementById('cliffSummary');
    const cliffBars = document.getElementById('cliffBars');
    let timer = null;
    let inflight = null;

    for (const id of ids) {
      const range = document.getElementById(id);
      const number = document.getElementById(id + 'N');
      range.addEventListener('input', () => { number.value = range.value; schedule(); });
      number.addEventListener('input', () => { range.value = number.value; schedule(); });
    }
    document.getElementById('text').addEventListener('change', schedule);
    document.getElementById('render').addEventListener('click', render);

    function payload() {
      return {
        fontSize: Number(document.getElementById('fontSize').value),
        threshold: Number(document.getElementById('threshold').value),
        lineSpacing: Number(document.getElementById('lineSpacing').value),
        frameSize: Number(document.getElementById('frameSize').value),
        contentWidth: Number(document.getElementById('contentWidth').value),
        contentHeight: Number(document.getElementById('contentHeight').value),
        margin: Number(document.getElementById('margin').value),
        text: document.getElementById('text').value,
      };
    }

    function schedule() {
      clearTimeout(timer);
      timer = setTimeout(render, 450);
    }

    function formatPercent(value) {
      return `${(value * 100).toFixed(value < 0.01 ? 2 : 1)}%`;
    }

    function renderCoverage(data) {
      const coverage = data.manifest.coverage;
      const threshold = data.request.threshold;
      document.getElementById('scale').textContent = `${coverage.scale_from_zpix_grid.toFixed(3)}×`;
      const edgeCliffs = coverage.top_edge_cliffs || [];
      const nearby = coverage.nearby_cliffs || [];
      const next = coverage.buckets.find((bucket) => bucket.coverage > threshold);
      const previous = [...coverage.buckets].reverse().find((bucket) => bucket.coverage <= threshold);
      const binary = edgeCliffs.length === 0 || edgeCliffs.reduce((sum, bucket) => sum + bucket.share, 0) < 0.005;
      if (binary) {
        cliffSummary.textContent = `${coverage.unique_buckets} buckets; mostly binary coverage. threshold has little effect until it reaches solid pixels.`;
      } else {
        const nextText = next ? `next loss @ ${next.coverage.toFixed(3)} (${formatPercent(next.share)})` : 'no higher cliff';
        const previousText = previous ? `last killed @ ${previous.coverage.toFixed(3)} (${formatPercent(previous.share)})` : 'none killed';
        cliffSummary.textContent = `${coverage.unique_buckets} buckets; black ${formatPercent(coverage.black_ratio_at_threshold)}. ${previousText}; ${nextText}.`;
      }
      const rows = nearby.length > 0 ? nearby : edgeCliffs.slice(0, 8);
      const maxShare = Math.max(...rows.map((bucket) => bucket.share), 0.000001);
      cliffBars.innerHTML = '';
      rows.forEach((bucket) => {
        const row = document.createElement('div');
        const close = Math.abs(bucket.coverage - threshold) <= 0.005;
        row.className = `cliff-row ${bucket.survives_current_threshold ? '' : 'dead'} ${close ? 'near' : ''}`;
        const label = document.createElement('span');
        label.className = 'mono';
        label.textContent = bucket.coverage.toFixed(3);
        const track = document.createElement('div');
        track.className = 'cliff-track';
        const fill = document.createElement('div');
        fill.className = 'cliff-fill';
        fill.style.width = `${Math.max(2, (bucket.share / maxShare) * 100)}%`;
        track.append(fill);
        const share = document.createElement('span');
        share.className = 'mono';
        share.textContent = formatPercent(bucket.share);
        row.append(label, track, share);
        cliffBars.append(row);
      });
    }

    async function render() {
      if (inflight) inflight.abort();
      inflight = new AbortController();
      document.getElementById('render').disabled = true;
      status.textContent = 'rendering';
      error.textContent = '';
      try {
        const response = await fetch('/api/render', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload()),
          signal: inflight.signal,
        });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || response.statusText);
        document.getElementById('frames').textContent = data.manifest.frame_count;
        document.getElementById('chars').textContent = data.manifest.compact_chars;
        document.getElementById('cpf').textContent = data.manifest.chars_per_frame.toFixed(0);
        document.getElementById('variant').textContent = data.name;
        renderCoverage(data);
        framesWrap.innerHTML = '';
        data.frames.forEach((src, index) => {
          const figure = document.createElement('figure');
          const caption = document.createElement('figcaption');
          caption.textContent = `frame ${String(index).padStart(4, '0')}`;
          const image = document.createElement('img');
          image.src = src;
          image.width = data.request.frameSize;
          image.height = data.request.frameSize;
          figure.append(caption, image);
          framesWrap.append(figure);
        });
        status.textContent = 'done';
      } catch (err) {
        if (err.name !== 'AbortError') {
          error.textContent = err.message;
          status.textContent = 'error';
        }
      } finally {
        document.getElementById('render').disabled = false;
      }
    }

    render();
  </script>
</body>
</html>
